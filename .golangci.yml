run:
  timeout: 5m
linters:
  enable:
    - gosec
    - staticcheck
    - errcheck
    - ineffassign
    - govet
    - unused
issues:
  exclude-rules:
    - path: _test\.go
      linters: [gosec, errcheck]
    - path: docs/
      linters: [gosec]
linters-settings:
  gosec:
    excludes:
      - G104  # too noisy for now; revisit
