# Automated release via GoReleaser when a version tag is pushed.
# Replaces the manual `make release-local` step that was previously
# required after tagging, preventing empty releases (see #332).

name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual escape hatch. A standalone tag re-push does not reliably re-fire
  # the tag-push event when the ref->SHA mapping is unchanged (GitHub
  # suppresses the duplicate event), which left v1.9.36 tagged but never
  # published. Dispatch this against `main` with the tag to publish, e.g.
  # `gh workflow run release.yml --ref main -f tag=v1.9.36`.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.9.36). Must already exist.'
        required: true
        type: string

# Serialize publish per tag. If a duplicate run is queued for the same tag
# (e.g. local worker accidentally re-publishes), goreleaser would race with
# itself and the second uploader would 422 already_exists on each of the 5
# assets (the v1.9.0-v1.9.5 race).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Tag-push runs use the pushed tag; manual dispatch supplies it explicitly.
    env:
      REF_NAME: ${{ inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Check out the tag itself so GoReleaser sees the version tag at HEAD,
          # even when dispatched against main.
          ref: ${{ inputs.tag || github.ref_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Validate tag matches code version
        run: |
          TAG="${REF_NAME#v}"
          CODE=$(grep 'var Version' cmd/agent-deck/main.go | head -1 | sed 's/.*= "\([^"]*\)".*/\1/')
          if [ "$TAG" != "$CODE" ]; then
            echo "ERROR: Tag v$TAG does not match code Version $CODE"
            exit 1
          fi
          echo "Version: $CODE"

      # zoxide backs the quick-open picker tests (#693, v1.7.54). Not on
      # ubuntu-latest by default; install here so `go test ./...` doesn't
      # false-fail on the non-title-lock zoxide_picker_test suite.
      - name: Install zoxide
        timeout-minutes: 5
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zoxide
          zoxide --version

      - name: Run tests
        timeout-minutes: 25
        run: go test -race -timeout 20m ./...

      # Evaluator harness full tier. Blocking — a release that fails eval
      # does not get a tag. See docs/rfc/EVALUATOR_HARNESS.md (#37).
      # Until `eval_full` cases exist, this runs the eval_smoke suite with
      # a longer timeout so smoke coverage is enforced at the release gate
      # too, not just on PRs.
      - name: Run eval harness (full tier)
        timeout-minutes: 10
        env:
          GOTOOLCHAIN: go1.25.10
        run: |
          go test -tags 'eval_smoke eval_full' -race -count=1 -timeout 6m ./tests/eval/... ./internal/ui/...

      - name: Run GoReleaser
        timeout-minutes: 15
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Validate release assets
        timeout-minutes: 5
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${REF_NAME#v}"
          echo "Validating assets for release ${REF_NAME} (version ${VERSION})..."

          ASSETS=$(gh api "repos/${{ github.repository }}/releases/tags/${REF_NAME}" --jq '.assets[].name')

          EXPECTED=(
            "agent-deck_${VERSION}_darwin_amd64.tar.gz"
            "agent-deck_${VERSION}_darwin_arm64.tar.gz"
            "agent-deck_${VERSION}_linux_amd64.tar.gz"
            "agent-deck_${VERSION}_linux_arm64.tar.gz"
          )

          MISSING=()
          for asset in "${EXPECTED[@]}"; do
            if ! echo "$ASSETS" | grep -qx "$asset"; then
              MISSING+=("$asset")
            fi
          done

          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "ERROR: The following expected release assets are missing:"
            for m in "${MISSING[@]}"; do
              echo "  - $m"
            done
            echo ""
            echo "All available assets:"
            echo "$ASSETS"
            exit 1
          fi

          # Also verify checksums.txt is present
          if ! echo "$ASSETS" | grep -qx "checksums.txt"; then
            echo "ERROR: checksums.txt is missing from the release assets"
            exit 1
          fi

          ASSET_COUNT=$(echo "$ASSETS" | wc -l | tr -d ' ')
          echo "All ${#EXPECTED[@]} platform tarballs and checksums.txt verified successfully."
          echo "Total assets in release: ${ASSET_COUNT}"
